name: Deploy to Firebase Hosting (Preview)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: firebase-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest

    env:
      FIREBASE_PROJECT_ID: fcportal-569e5
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate environment variables
        run: |
          for var in FIREBASE_TOKEN VITE_API_URL; do
            if [ -z "${!var}" ]; then
              echo "Error: $var is not set"
              exit 1
            fi
          done
          echo "All environment variables are set"

      - name: Build project
        run: npm run build

      - name: Deploy to Firebase preview channel
        id: firebase_deploy
        run: |
          CHANNEL_NAME="pr-${{ github.event.pull_request.number }}"
          OUTPUT=$(npx firebase-tools hosting:channel:deploy "$CHANNEL_NAME" --expires 7d --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN" --json)
          echo "$OUTPUT"
          PREVIEW_URL=$(echo "$OUTPUT" | python3 -c "import os,sys,json; data=json.load(sys.stdin); project=os.environ.get('FIREBASE_PROJECT_ID',''); print(data.get('result',{}).get(project,{}).get('url',''))")
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.firebase_deploy.outputs.preview_url }}';
            const body = `🚀 **Firebase Preview Deploy**\n\n` +
              `Preview URL: ${previewUrl}\n\n` +
              `This preview will expire in 7 days.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Firebase Preview Deploy')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
