name: Deploy to Firebase Hosting (Preview)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate environment variables
        run: |
          for var in VITE_FB_API_KEY VITE_FB_AUTH_DOMAIN VITE_FB_PROJECT_ID VITE_FB_STORAGE_BUCKET VITE_FB_MESSAGING_SENDER_ID VITE_FB_APP_ID; do
            if [ -z "${!var}" ]; then
              echo "Error: $var is not set"
              exit 1
            fi
          done
          echo "All environment variables are set"
        env:
          VITE_FB_API_KEY: ${{ secrets.VITE_FB_API_KEY }}
          VITE_FB_AUTH_DOMAIN: ${{ secrets.VITE_FB_AUTH_DOMAIN }}
          VITE_FB_PROJECT_ID: ${{ secrets.VITE_FB_PROJECT_ID }}
          VITE_FB_STORAGE_BUCKET: ${{ secrets.VITE_FB_STORAGE_BUCKET }}
          VITE_FB_MESSAGING_SENDER_ID: ${{ secrets.VITE_FB_MESSAGING_SENDER_ID }}
          VITE_FB_APP_ID: ${{ secrets.VITE_FB_APP_ID }}

      - name: Build project
        run: npm run build
        env:
          VITE_FB_API_KEY: ${{ secrets.VITE_FB_API_KEY }}
          VITE_FB_AUTH_DOMAIN: ${{ secrets.VITE_FB_AUTH_DOMAIN }}
          VITE_FB_PROJECT_ID: ${{ secrets.VITE_FB_PROJECT_ID }}
          VITE_FB_STORAGE_BUCKET: ${{ secrets.VITE_FB_STORAGE_BUCKET }}
          VITE_FB_MESSAGING_SENDER_ID: ${{ secrets.VITE_FB_MESSAGING_SENDER_ID }}
          VITE_FB_APP_ID: ${{ secrets.VITE_FB_APP_ID }}

      - name: Deploy to Firebase preview channel
        id: firebase_deploy
        run: |
          CHANNEL_NAME="pr-${{ github.event.pull_request.number }}"
          OUTPUT=$(npx firebase-tools hosting:channel:deploy "$CHANNEL_NAME" --expires 7d --token "$FIREBASE_TOKEN" --json)
          echo "$OUTPUT"
          PREVIEW_URL=$(echo "$OUTPUT" | python3 -c "import sys,json; data=json.load(sys.stdin); urls=data.get('result',{}).values(); print(list(urls)[0].get('url','') if urls else '')")
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.firebase_deploy.outputs.preview_url }}';
            const body = `🚀 **Firebase Preview Deploy**\n\n` +
              `Preview URL: ${previewUrl}\n\n` +
              `This preview will expire in 7 days.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Firebase Preview Deploy')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
