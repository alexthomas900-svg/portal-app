name: Deploy to Firebase Hosting (Production)

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: firebase-production-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FIREBASE_PROJECT_ID: fcportal-569e5
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate environment variables
        run: |
          for var in FIREBASE_TOKEN VITE_API_URL; do
            if [ -z "${!var}" ]; then
              echo "Error: $var is not set"
              exit 1
            fi
          done
          echo "All environment variables are set"

      - name: Build project
        run: npm run build

      - name: Deploy to Firebase Hosting (Live)
        run: npx firebase-tools deploy --only hosting --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN" --non-interactive

      - name: Trigger Render backend deploy
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"
